<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채점 관리자</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ── 기본 ── */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f6fa;min-height:100vh;}

/* ── 사이드바 ── */
.layout{display:flex;min-height:100vh;}
.sidebar{width:220px;background:#1e293b;flex-shrink:0;display:flex;flex-direction:column;}
.logo{padding:20px 18px;font-size:16px;font-weight:700;color:#fff;border-bottom:1px solid #334155;}
.logo span{font-size:11px;font-weight:400;color:#94a3b8;display:block;margin-top:2px;}
.nav-item{padding:12px 18px;font-size:14px;color:#94a3b8;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{color:#fff;background:#334155;}
.nav-item.active{color:#fff;background:#334155;border-left-color:#3b82f6;}
.nav-icon{width:18px;height:18px;flex-shrink:0;}

/* ── 메인 ── */
.main{flex:1;overflow-y:auto;}
.page{display:none;padding:28px 32px;}
.page.active{display:block;}
.page-title{font-size:20px;font-weight:700;color:#111;margin-bottom:6px;}
.page-sub{font-size:13px;color:#6b7280;margin-bottom:24px;}

/* ── 카드 ── */
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px;}
.card-title{font-size:15px;font-weight:600;color:#374151;margin-bottom:16px;}

/* ── 폼 ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:6px;}
.field input,.field select{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit;transition:border .15s;}
.field input:focus,.field select:focus{border-color:#3b82f6;}

/* ── 문항 설정 ── */
.q-row{display:grid;grid-template-columns:60px 1fr 110px 80px 80px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #f3f4f6;}
.q-row:first-child{font-size:12px;font-weight:600;color:#6b7280;padding-bottom:8px;}
.q-row:last-child{border-bottom:none;}
.q-row input,.q-row select{border:1px solid #e5e7eb;border-radius:6px;padding:7px 10px;font-size:13px;width:100%;outline:none;font-family:inherit;}
.q-row input:focus,.q-row select:focus{border-color:#3b82f6;}
.q-num-badge{font-size:14px;font-weight:600;color:#374151;text-align:center;}
.del-btn{width:28px;height:28px;border:none;background:#fee2e2;color:#dc2626;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;margin:auto;}

/* ── 버튼 ── */
.btn{padding:9px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none;}
.btn-primary{background:#3b82f6;color:#fff;}
.btn-primary:hover{background:#2563eb;}
.btn-gray{background:#f3f4f6;color:#374151;}
.btn-gray:hover{background:#e5e7eb;}
.btn-danger{background:#fee2e2;color:#dc2626;}
.btn-danger:hover{background:#fecaca;}
.btn-green{background:#d1fae5;color:#065f46;}
.btn-green:hover{background:#a7f3d0;}
.btn-sm{padding:5px 12px;font-size:12px;}

/* ── 시험 목록 ── */
.exam-table{width:100%;border-collapse:collapse;}
.exam-table th{padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#6b7280;background:#f9fafb;border-bottom:1px solid #e5e7eb;}
.exam-table td{padding:13px 14px;border-bottom:1px solid #f3f4f6;font-size:13px;color:#374151;vertical-align:middle;}
.exam-table tr:last-child td{border-bottom:none;}
.exam-table tr:hover td{background:#fafafa;}
.badge-active{font-size:11px;padding:3px 10px;background:#d1fae5;color:#065f46;border-radius:10px;}
.badge-closed{font-size:11px;padding:3px 10px;background:#f3f4f6;color:#6b7280;border-radius:10px;}
.btn-row{display:flex;gap:6px;}

/* ── QR 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:16px;padding:32px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-title{font-size:16px;font-weight:700;color:#111;margin-bottom:4px;}
.modal-sub{font-size:13px;color:#6b7280;margin-bottom:20px;}
#qr-box{display:flex;justify-content:center;margin-bottom:16px;}
.qr-url{font-size:11px;color:#9ca3af;word-break:break-all;background:#f9fafb;padding:8px 10px;border-radius:8px;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;justify-content:center;}

/* ── 채점 대시보드 ── */
.dash-layout{display:flex;gap:0;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;background:#fff;}
.student-sidebar{width:200px;flex-shrink:0;border-right:1px solid #e5e7eb;}
.student-sidebar-head{padding:12px 16px;font-size:12px;font-weight:600;color:#6b7280;background:#f9fafb;border-bottom:1px solid #e5e7eb;}
.s-item{display:grid;grid-template-columns:1fr 64px;cursor:pointer;border-bottom:1px solid #f3f4f6;transition:background .1s;}
.s-item:hover{background:#f9fafb;}
.s-item.active{background:#eff6ff;}
.s-item:last-child{border-bottom:none;}
.s-item span{padding:12px 14px;font-size:13px;color:#374151;}
.s-item .s-score{color:#3b82f6;font-weight:600;text-align:right;}
.grade-main{flex:1;overflow:hidden;}
.grade-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#f9fafb;border-bottom:1px solid #e5e7eb;flex-wrap:wrap;gap:8px;}
.grade-head-title{font-size:14px;font-weight:600;color:#111;}
.grade-head-btns{display:flex;gap:6px;}
.all-o-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border:1.5px solid #3b82f6;border-radius:8px;font-size:12px;cursor:pointer;background:#fff;color:#3b82f6;font-weight:600;}
.all-x-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border:1.5px solid #ef4444;border-radius:8px;font-size:12px;cursor:pointer;background:#fff;color:#ef4444;font-weight:600;}
.grade-table{width:100%;border-collapse:collapse;}
.grade-table th{padding:10px 16px;text-align:center;font-size:12px;font-weight:600;color:#6b7280;background:#f9fafb;border-bottom:1px solid #e5e7eb;}
.grade-table td{padding:12px 16px;border-bottom:1px solid #f3f4f6;text-align:center;font-size:14px;}
.grade-table tr:last-child td{border-bottom:none;}
.o-btn,.x-btn{width:34px;height:34px;border-radius:50%;border:2px solid #e5e7eb;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.o-btn:hover{border-color:#3b82f6;}
.x-btn:hover{border-color:#ef4444;}
.o-btn.on{border-color:#3b82f6;}
.o-btn.on svg{stroke:#3b82f6;}
.x-btn.on{border-color:#ef4444;}
.x-btn.on svg{stroke:#ef4444;}
.ox-wrap{display:flex;gap:8px;justify-content:center;}
.essay-score-input{width:64px;border:1px solid #e5e7eb;border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;outline:none;}
.essay-score-input:focus{border-color:#3b82f6;}
.save-essay-btn{padding:5px 12px;background:#d1fae5;color:#065f46;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}

/* ── 통계 탭 ── */
.tab-row{display:flex;gap:4px;margin-bottom:16px;}
.tab{padding:7px 16px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#6b7280;font-weight:500;}
.tab.active{background:#3b82f6;border-color:#3b82f6;color:#fff;}
.stat-panel{display:none;}
.stat-panel.active{display:block;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-box{background:#f9fafb;border-radius:10px;padding:14px 16px;}
.stat-label{font-size:12px;color:#6b7280;margin-bottom:4px;}
.stat-val{font-size:22px;font-weight:700;color:#111;}
.stat-unit{font-size:13px;font-weight:400;color:#9ca3af;}
.bar-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f3f4f6;}
.bar-row:last-child{border-bottom:none;}
.bar-num{width:40px;font-size:13px;color:#6b7280;text-align:right;}
.bar-bg{flex:1;height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .3s;}
.bar-pct{width:40px;font-size:12px;color:#6b7280;}
.bar-ans{width:28px;font-size:14px;text-align:center;}

/* ── 반응형 ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .form-grid{grid-template-columns:1fr;}
  .stat-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div class="layout">
  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="logo">채점 시스템<span>선생님 전용</span></div>
    <div class="nav-item active" onclick="showPage('exams')">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="#94a3b8" stroke-width="1.5"><rect x="3" y="3" width="14" height="14" rx="2"/><line x1="7" y1="8" x2="13" y2="8"/><line x1="7" y1="12" x2="11" y2="12"/></svg>
      시험 목록
    </div>
    <div class="nav-item" onclick="showPage('create')">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="#94a3b8" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><line x1="10" y1="7" x2="10" y2="13"/><line x1="7" y1="10" x2="13" y2="10"/></svg>
      시험 등록
    </div>
    <div class="nav-item" onclick="showPage('grade')" id="nav-grade" style="display:none;">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="#94a3b8" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><polyline points="7,10 9,12 13,8"/></svg>
      채점하기
    </div>
    <div class="nav-item" onclick="showPage('stats')" id="nav-stats" style="display:none;">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="#94a3b8" stroke-width="1.5"><rect x="4" y="10" width="3" height="7"/><rect x="8.5" y="6" width="3" height="11"/><rect x="13" y="3" width="3" height="14"/></svg>
      통계 보기
    </div>
  </div>

  <!-- 메인 -->
  <div class="main">

    <!-- ① 시험 목록 -->
    <div class="page active" id="page-exams">
      <div class="page-title">시험 목록</div>
      <div class="page-sub">등록된 시험을 관리하고 QR코드를 확인하세요.</div>
      <div class="card" style="padding:0;overflow:hidden;">
        <table class="exam-table">
          <thead>
            <tr>
              <th>시험 제목</th>
              <th>반</th>
              <th>시험일</th>
              <th>문항</th>
              <th>상태</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="exam-list-body">
            <tr><td colspan="6" style="text-align:center;padding:32px;color:#9ca3af;">불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ② 시험 등록 -->
    <div class="page" id="page-create">
      <div class="page-title">시험 등록</div>
      <div class="page-sub">시험 정보와 답안을 입력하면 QR코드가 자동 생성됩니다.</div>

      <div class="card">
        <div class="card-title">기본 정보</div>
        <div class="form-grid">
          <div class="field"><label>시험 제목</label><input type="text" id="c-title" placeholder="2025년 3월 모의고사 수학"></div>
          <div class="field"><label>반 이름</label><input type="text" id="c-class" placeholder="서아카 화요일반 성덕고"></div>
          <div class="field"><label>시험일</label><input type="date" id="c-date"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">문항 설정</div>
        <div class="q-row">
          <span>번호</span><span>유형</span><span>정답</span><span>배점</span><span></span>
        </div>
        <div id="q-list"></div>
        <div style="display:flex;gap:8px;margin-top:14px;">
          <button class="btn btn-gray" onclick="addQuestion('mc')">+ 객관식 추가</button>
          <button class="btn btn-gray" onclick="addQuestion('essay')">+ 서술형 추가</button>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;">
        <button class="btn btn-primary" onclick="createExam()" style="padding:12px 28px;font-size:15px;">시험 등록 및 QR 생성</button>
      </div>
    </div>

    <!-- ③ 채점하기 -->
    <div class="page" id="page-grade">
      <div class="page-title" id="grade-page-title">채점하기</div>
      <div class="page-sub" id="grade-page-sub">—</div>

      <div class="dash-layout" id="grade-layout">
        <div class="student-sidebar">
          <div class="student-sidebar-head">수강생</div>
          <div id="grade-student-list"></div>
        </div>
        <div class="grade-main">
          <div class="grade-head">
            <div class="grade-head-title" id="grade-student-name">학생을 선택하세요</div>
            <div class="grade-head-btns">
              <button class="all-o-btn" onclick="markAll('O')">
                전체 <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#3b82f6" stroke-width="2"><circle cx="7" cy="7" r="5"/></svg>
              </button>
              <button class="all-x-btn" onclick="markAll('X')">
                전체 <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#ef4444" stroke-width="2"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>
              </button>
            </div>
          </div>
          <table class="grade-table">
            <thead>
              <tr><th>번호</th><th style="text-align:left;">정답</th><th>학생 답안</th><th>채점</th></tr>
            </thead>
            <tbody id="grade-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ④ 통계 -->
    <div class="page" id="page-stats">
      <div class="page-title" id="stats-page-title">통계</div>
      <div class="page-sub" id="stats-page-sub">—</div>

      <div class="tab-row">
        <div class="tab active" onclick="switchStatTab('overview',this)">전체 현황</div>
        <div class="tab" onclick="switchStatTab('items',this)">문항별 오답률</div>
      </div>

      <div class="stat-panel active" id="tab-overview">
        <div class="stat-grid" id="stat-cards"></div>
        <div class="card" style="padding:0;overflow:hidden;">
          <table class="exam-table" id="stat-student-table">
            <thead><tr><th>번호</th><th>이름</th><th>객관식</th><th>서술형</th><th>합계</th><th>상태</th></tr></thead>
            <tbody id="stat-student-body"></tbody>
          </table>
        </div>
      </div>

      <div class="stat-panel" id="tab-items">
        <div class="card">
          <div id="item-bars"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- QR 모달 -->
<div class="modal-bg" id="qr-modal" style="display:none;">
  <div class="modal">
    <div class="modal-title" id="modal-title">QR코드</div>
    <div class="modal-sub" id="modal-sub">시험지에 인쇄하세요</div>
    <div id="qr-box"></div>
    <div class="qr-url" id="qr-url-text"></div>
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="downloadQR()">QR 이미지 저장</button>
      <button class="btn btn-gray" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  ★ 여기를 반드시 본인 Apps Script URL로 교체 ★
const API_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
//  ★ GitHub Pages 주소 (학생용 페이지 URL)      ★
const STUDENT_URL = 'https://YOUR_GITHUB_ID.github.io/YOUR_REPO/student.html';
// ══════════════════════════════════════════════

let examList    = [];
let currentExam = null;   // 현재 선택된 시험 (getResults 결과)
let currentStudentIdx = 0;
const grading   = {};     // grading[submitId][qNum] = 'O'|'X'

// ── API ──
async function api(params) {
  const res = await fetch(API_URL + '?' + new URLSearchParams(params));
  return res.json();
}
async function apiPost(body) {
  const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  return res.json();
}

// ── 페이지 전환 ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  event.currentTarget.classList.add('active');
}

// ──────────────────────────────────────────────
//  시험 목록 로드
// ──────────────────────────────────────────────
async function loadExamList() {
  const res = await api({ action: 'getExamList' });
  if (!res.success) return;
  examList = res.data;
  renderExamList();
}

function renderExamList() {
  const tbody = document.getElementById('exam-list-body');
  if (examList.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:#9ca3af;">등록된 시험이 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = '';
  examList.forEach(ex => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:600;">${ex.title}</td>
      <td>${ex.className}</td>
      <td>${ex.date || '—'}</td>
      <td>객관식 ${ex.mcCount}문 / 서술형 ${ex.essayCount}문</td>
      <td><span class="${ex.active==='Y'?'badge-active':'badge-closed'}">${ex.active==='Y'?'진행중':'마감'}</span></td>
      <td>
        <div class="btn-row">
          <button class="btn btn-gray btn-sm" onclick="showQR('${ex.examId}','${ex.title}','${ex.className}')">QR</button>
          <button class="btn btn-green btn-sm" onclick="openGrade('${ex.examId}')">채점</button>
          <button class="btn btn-gray btn-sm" onclick="toggleExam('${ex.examId}','${ex.active==='Y'?'N':'Y'}')">${ex.active==='Y'?'마감':'재개'}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteExam('${ex.examId}')">삭제</button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });
}

// ──────────────────────────────────────────────
//  시험 등록
// ──────────────────────────────────────────────
let qCount = 0;
function addQuestion(type) {
  qCount++;
  const div = document.createElement('div');
  div.className = 'q-row';
  div.id = 'q-'+qCount;
  if (type === 'mc') {
    div.innerHTML = `
      <div class="q-num-badge">${qCount}</div>
      <select><option value="mc" selected>객관식</option><option value="essay">서술형</option></select>
      <select>
        <option>①</option><option>②</option><option>③</option><option>④</option><option>⑤</option>
      </select>
      <input type="number" value="5" min="1" max="100" placeholder="배점">
      <button class="del-btn" onclick="document.getElementById('q-${qCount}').remove();renumberQ()">✕</button>`;
  } else {
    div.innerHTML = `
      <div class="q-num-badge">${qCount}</div>
      <select><option value="mc">객관식</option><option value="essay" selected>서술형</option></select>
      <input type="text" placeholder="직접 채점" disabled style="color:#9ca3af;background:#f9fafb;">
      <input type="number" value="10" min="1" max="100" placeholder="배점">
      <button class="del-btn" onclick="document.getElementById('q-${qCount}').remove();renumberQ()">✕</button>`;
  }
  document.getElementById('q-list').appendChild(div);
}

function renumberQ() {
  document.querySelectorAll('#q-list .q-row').forEach((row, i) => {
    const badge = row.querySelector('.q-num-badge');
    if (badge) badge.textContent = i + 1;
  });
}

async function createExam() {
  const title   = document.getElementById('c-title').value.trim();
  const cls     = document.getElementById('c-class').value.trim();
  const date    = document.getElementById('c-date').value;
  if (!title || !cls) { alert('시험 제목과 반 이름을 입력해주세요.'); return; }

  const rows = document.querySelectorAll('#q-list .q-row');
  if (rows.length === 0) { alert('문항을 최소 1개 이상 추가하세요.'); return; }

  const questions = [];
  let valid = true;
  rows.forEach((row, i) => {
    const selects = row.querySelectorAll('select');
    const inputs  = row.querySelectorAll('input');
    const type    = selects[0].value;
    const answer  = type === 'mc' ? selects[1].value : '';
    const score   = Number(inputs[type==='mc'?0:1]?.value || inputs[0].value);
    if (!score) { valid = false; return; }
    questions.push({ num: i+1, type, answer, score });
  });

  if (!valid) { alert('모든 문항의 배점을 입력해주세요.'); return; }

  const btn = event.currentTarget;
  btn.disabled = true; btn.textContent = '등록 중...';

  const res = await apiPost({ action:'createExam', title, className:cls, date, questions });
  btn.disabled = false; btn.textContent = '시험 등록 및 QR 생성';

  if (!res.success) { alert('오류: ' + res.error); return; }

  alert('✅ 시험이 등록되었습니다!');
  await loadExamList();
  showQR(res.data.examId, res.data.title, res.data.className);

  // 폼 초기화
  document.getElementById('c-title').value = '';
  document.getElementById('c-class').value = '';
  document.getElementById('c-date').value  = '';
  document.getElementById('q-list').innerHTML = '';
  qCount = 0;
}

// ──────────────────────────────────────────────
//  QR 모달
// ──────────────────────────────────────────────
let currentQRExamId = '';
function showQR(examId, title, className) {
  currentQRExamId = examId;
  const url = `${STUDENT_URL}?examId=${examId}`;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-sub').textContent   = className;
  document.getElementById('qr-url-text').textContent = url;
  document.getElementById('qr-box').innerHTML = '';
  new QRCode(document.getElementById('qr-box'), {
    text: url, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.M
  });
  document.getElementById('qr-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('qr-modal').style.display = 'none';
}

function downloadQR() {
  const canvas = document.querySelector('#qr-box canvas');
  if (!canvas) { alert('QR코드가 생성되지 않았습니다.'); return; }
  const link = document.createElement('a');
  link.download = 'QR_' + currentQRExamId + '.png';
  link.href = canvas.toDataURL();
  link.click();
}

// ──────────────────────────────────────────────
//  채점 화면
// ──────────────────────────────────────────────
async function openGrade(examId) {
  document.getElementById('nav-grade').style.display = 'flex';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-grade').classList.add('active');
  document.getElementById('nav-grade').classList.add('active');

  document.getElementById('grade-page-title').textContent = '채점하기 — 불러오는 중...';
  document.getElementById('grade-table-body').innerHTML = '<tr><td colspan="4" style="text-align:center;padding:24px;color:#9ca3af;">불러오는 중...</td></tr>';
  document.getElementById('grade-student-list').innerHTML = '';

  const res = await api({ action:'getResults', examId });
  if (!res.success) { alert('오류: ' + res.error); return; }
  currentExam = res.data;

  document.getElementById('grade-page-title').textContent = currentExam.exam.title + ' — 채점';
  document.getElementById('grade-page-sub').textContent   = currentExam.exam.className;

  // 채점 초기값 설정
  currentExam.students.forEach(s => {
    grading[s.submitId] = {};
    const mcQs = currentExam.exam.questions.filter(q => q.type === 'mc');
    mcQs.forEach(q => {
      const submitted = String(s.mcAnswers[q.num] || '');
      const correct   = String(q.answer);
      grading[s.submitId][q.num] = submitted === correct ? 'O' : 'X';
    });
  });

  renderGradeStudents();
  if (currentExam.students.length > 0) {
    currentStudentIdx = 0;
    renderGradeTable();
  } else {
    document.getElementById('grade-table-body').innerHTML = '<tr><td colspan="4" style="text-align:center;padding:32px;color:#9ca3af;">아직 제출한 학생이 없습니다.</td></tr>';
  }

  // 통계 탭도 열기 가능하게
  document.getElementById('nav-stats').style.display = 'flex';
  document.getElementById('stats-page-title').textContent = currentExam.exam.title + ' — 통계';
  document.getElementById('stats-page-sub').textContent   = currentExam.exam.className;
  renderStats();
}

function calcMcScore(submitId) {
  const s   = currentExam.students.find(s => s.submitId === submitId);
  const mcQs = currentExam.exam.questions.filter(q => q.type === 'mc');
  let score = 0;
  mcQs.forEach(q => {
    if (grading[submitId][q.num] === 'O') score += Number(q.score);
  });
  return score;
}

function renderGradeStudents() {
  const list = document.getElementById('grade-student-list');
  list.innerHTML = '';
  currentExam.students.forEach((s, i) => {
    const mcScore    = calcMcScore(s.submitId);
    const essayScore = Number(s.essayScore) || 0;
    const total      = s.done === 'Y' ? mcScore + essayScore : mcScore;
    const div = document.createElement('div');
    div.className = 's-item' + (i === currentStudentIdx ? ' active' : '');
    div.id = 'si-' + i;
    div.innerHTML = `<span>${s.studentName}</span><span class="s-score">${total}점</span>`;
    div.onclick = () => { currentStudentIdx = i; renderGradeStudents(); renderGradeTable(); };
    list.appendChild(div);
  });
}

function renderGradeTable() {
  const s   = currentExam.students[currentStudentIdx];
  const mcQs  = currentExam.exam.questions.filter(q => q.type === 'mc');
  const essayQs = currentExam.exam.questions.filter(q => q.type === 'essay');

  document.getElementById('grade-student-name').textContent = s.studentName + ' 채점표';
  const tbody = document.getElementById('grade-table-body');
  tbody.innerHTML = '';

  // 객관식
  mcQs.forEach(q => {
    const mark      = grading[s.submitId][q.num];
    const submitted = s.mcAnswers[q.num] || '—';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${q.num}</td>
      <td style="text-align:left;font-size:16px;">${q.answer}</td>
      <td style="font-size:16px;color:${mark==='X'?'#ef4444':'#374151'}">${submitted}</td>
      <td>
        <div class="ox-wrap">
          <button class="o-btn ${mark==='O'?'on':''}" onclick="setMark('${s.submitId}',${q.num},'O',${q.score})">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="${mark==='O'?'#3b82f6':'#d1d5db'}" stroke-width="2"><circle cx="8" cy="8" r="5.5"/></svg>
          </button>
          <button class="x-btn ${mark==='X'?'on':''}" onclick="setMark('${s.submitId}',${q.num},'X',${q.score})">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="${mark==='X'?'#ef4444':'#d1d5db'}" stroke-width="2"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
          </button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });

  // 서술형
  essayQs.forEach(q => {
    const essayText = s.essayAnswers[q.num] || '(미작성)';
    const tr = document.createElement('tr');
    tr.style.background = '#fffbeb';
    tr.innerHTML = `
      <td>${q.num}<div style="font-size:10px;color:#d97706;margin-top:2px;">서술형</div></td>
      <td style="text-align:left;font-size:12px;color:#6b7280;max-width:200px;">${essayText}</td>
      <td>—</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px;justify-content:center;">
          <input class="essay-score-input" type="number" min="0" max="${q.score}" placeholder="0~${q.score}" value="${s.essayScore||''}" id="essay-input-${s.submitId}">
          <button class="save-essay-btn" onclick="saveEssay('${s.submitId}')">저장</button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });
}

function setMark(submitId, qNum, mark) {
  grading[submitId][qNum] = mark;
  renderGradeStudents();
  renderGradeTable();
}

function markAll(mark) {
  const s   = currentExam.students[currentStudentIdx];
  const mcQs = currentExam.exam.questions.filter(q => q.type === 'mc');
  mcQs.forEach(q => { grading[s.submitId][q.num] = mark; });
  renderGradeStudents();
  renderGradeTable();
}

async function saveEssay(submitId) {
  const input = document.getElementById('essay-input-' + submitId);
  const score = Number(input.value);
  const res   = await apiPost({ action:'updateEssay', submitId, essayScore: score });
  if (!res.success) { alert('저장 실패: ' + res.error); return; }

  // 로컬 업데이트
  const s = currentExam.students.find(s => s.submitId === submitId);
  if (s) { s.essayScore = score; s.done = 'Y'; }
  alert('✅ 서술형 점수가 저장되었습니다.');
  renderGradeStudents();
}

// ──────────────────────────────────────────────
//  통계
// ──────────────────────────────────────────────
function renderStats() {
  if (!currentExam) return;
  const { students, exam, itemStats } = currentExam;

  // 요약 카드
  const scores = students.map(s => Number(s.mcScore) || 0);
  const avg    = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  const maxS   = scores.length ? Math.max(...scores) : 0;
  const minS   = scores.length ? Math.min(...scores) : 0;
  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-box"><div class="stat-label">제출 인원</div><div class="stat-val">${students.length}<span class="stat-unit">명</span></div></div>
    <div class="stat-box"><div class="stat-label">평균 점수</div><div class="stat-val">${avg}<span class="stat-unit">점</span></div></div>
    <div class="stat-box"><div class="stat-label">최고 점수</div><div class="stat-val">${maxS}<span class="stat-unit">점</span></div></div>
    <div class="stat-box"><div class="stat-label">최저 점수</div><div class="stat-val">${minS}<span class="stat-unit">점</span></div></div>`;

  // 학생별 표
  const tbody = document.getElementById('stat-student-body');
  tbody.innerHTML = '';
  students.forEach(s => {
    const total = s.done === 'Y' ? (Number(s.mcScore)||0) + (Number(s.essayScore)||0) : (Number(s.mcScore)||0);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${s.studentNum}</td><td>${s.studentName}</td>
      <td>${s.mcScore}점</td>
      <td>${s.essayScore ? s.essayScore+'점' : '<span style="color:#9ca3af">미채점</span>'}</td>
      <td><strong>${total}점</strong></td>
      <td><span class="${s.done==='Y'?'badge-active':'badge-closed'}">${s.done==='Y'?'채점완료':'미완료'}</span></td>`;
    tbody.appendChild(tr);
  });

  // 오답률 바
  const mcQs = exam.questions.filter(q => q.type === 'mc');
  const bars = document.getElementById('item-bars');
  bars.innerHTML = '';
  mcQs.forEach(q => {
    const stat = itemStats[q.num];
    const pct  = stat ? stat.wrongPct : 0;
    const color = pct >= 60 ? '#ef4444' : pct >= 30 ? '#f59e0b' : '#10b981';
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-num">${q.num}번</div>
      <div class="bar-ans">${q.answer}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>
      <div class="bar-pct">${pct}%</div>
      <div style="font-size:11px;color:${color};width:40px;">${pct>=60?'고난도':pct>=30?'주의':'양호'}</div>`;
    bars.appendChild(row);
  });
}

function switchStatTab(id, el) {
  document.querySelectorAll('.stat-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  el.classList.add('active');
}

// ──────────────────────────────────────────────
//  시험 상태 토글 / 삭제
// ──────────────────────────────────────────────
async function toggleExam(examId, active) {
  const res = await apiPost({ action:'toggleExam', examId, active: active === 'Y' });
  if (!res.success) { alert('오류: ' + res.error); return; }
  await loadExamList();
}

async function deleteExam(examId) {
  if (!confirm('정말 삭제하시겠습니까? 삭제 후 복구할 수 없습니다.')) return;
  const res = await apiPost({ action:'deleteExam', examId });
  if (!res.success) { alert('오류: ' + res.error); return; }
  await loadExamList();
}

// ── 초기화 ──
loadExamList();
</script>
