<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>답안 제출</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f6fa;min-height:100vh;padding-bottom:60px;}
.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 20px;position:sticky;top:0;z-index:10;}
.header-title{font-size:16px;font-weight:600;color:#111;}
.header-sub{font-size:12px;color:#6b7280;margin-top:2px;}
.card{background:#fff;border-radius:12px;padding:18px 20px;margin:12px 16px 0;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field label{display:block;font-size:12px;color:#6b7280;margin-bottom:5px;}
.field input{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:15px;outline:none;transition:border .15s;}
.field input:focus{border-color:#3b82f6;}
.field input:disabled{background:#f9fafb;color:#374151;font-weight:600;}
.section-title{font-size:13px;font-weight:600;color:#6b7280;margin:20px 16px 0;letter-spacing:.03em;}
.q-card{background:#fff;border-radius:12px;padding:16px 18px;margin:8px 16px 0;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.q-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.q-num{font-size:13px;font-weight:600;color:#374151;}
.q-score{font-size:11px;color:#9ca3af;background:#f3f4f6;padding:2px 8px;border-radius:10px;}
.tag-essay{font-size:11px;color:#3b82f6;background:#eff6ff;padding:2px 8px;border-radius:10px;}
.choices{display:flex;gap:8px;flex-wrap:wrap;}
.choice{width:44px;height:44px;border-radius:50%;border:1.5px solid #e5e7eb;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#374151;}
.choice:hover{border-color:#93c5fd;color:#3b82f6;}
.choice.sel{border-color:#3b82f6;background:#3b82f6;color:#fff;}
.essay-box{width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;min-height:80px;resize:vertical;outline:none;transition:border .15s;line-height:1.6;}
.essay-box:focus{border-color:#3b82f6;}
.submit-wrap{padding:20px 16px 0;}
.submit-btn{width:100%;padding:15px;background:#3b82f6;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;}
.submit-btn:hover{background:#2563eb;}
.submit-btn:disabled{background:#9ca3af;cursor:not-allowed;}
.spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:20px;margin:12px 16px;text-align:center;color:#dc2626;line-height:1.6;}
.verify-wrap{padding:32px 20px;text-align:center;}
.verify-icon{font-size:48px;margin-bottom:12px;}
.verify-title{font-size:18px;font-weight:700;color:#111;margin-bottom:6px;}
.verify-sub{font-size:13px;color:#6b7280;margin-bottom:24px;line-height:1.6;}
.verify-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);text-align:left;margin-bottom:12px;}
.manual-row{display:flex;gap:8px;align-items:flex-end;}
.manual-row .field{flex:1;}
#result-screen{display:none;}
.result-header{background:#fff;border-radius:12px;padding:24px 20px;margin:12px 16px 0;box-shadow:0 1px 3px rgba(0,0,0,.06);text-align:center;}
.result-name{font-size:15px;color:#6b7280;margin-bottom:4px;}
.result-score{font-size:48px;font-weight:700;color:#3b82f6;line-height:1;}
.result-score span{font-size:20px;font-weight:400;color:#9ca3af;}
.result-sub{font-size:13px;color:#9ca3af;margin-top:8px;}
.result-tbl{width:100%;border-collapse:collapse;}
.result-tbl th{padding:10px 14px;background:#f9fafb;font-size:12px;font-weight:600;color:#6b7280;text-align:center;border-bottom:1px solid #e5e7eb;}
.result-tbl td{padding:12px 14px;border-bottom:1px solid #f3f4f6;text-align:center;font-size:14px;}
.result-tbl tr:last-child td{border-bottom:none;}
.badge-o{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:2px solid #3b82f6;}
.badge-o svg{stroke:#3b82f6;fill:none;stroke-width:2.5;}
.badge-x{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:2px solid #ef4444;}
.badge-x svg{stroke:#ef4444;fill:none;stroke-width:2.5;}
.badge-skip{font-size:12px;color:#9ca3af;background:#f3f4f6;padding:3px 10px;border-radius:10px;}
.essay-notice{background:#eff6ff;border-radius:10px;padding:14px 16px;margin:12px 16px 0;font-size:13px;color:#3b82f6;line-height:1.6;}
.verified-badge{display:inline-flex;align-items:center;gap:6px;background:#d1fae5;color:#065f46;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:12px;}
</style>
</head>
<body>
<div id="loading-screen">
  <div style="padding:60px 20px;text-align:center;">
    <div class="spinner"></div>
    <div style="font-size:14px;color:#6b7280;">불러오는 중...</div>
  </div>
</div>
<div id="error-screen" style="display:none;"><div class="error-box" id="error-msg"></div></div>
<div id="verify-screen" style="display:none;">
  <div class="header">
    <div class="header-title" id="verify-exam-title">—</div>
    <div class="header-sub" id="verify-exam-class">—</div>
  </div>
  <div class="verify-wrap">
    <div class="verify-icon">👤</div>
    <div class="verify-title">학생 확인</div>
    <div class="verify-sub">번호와 이름을 입력하세요.</div>
    <div class="verify-card">
      <div class="manual-row">
        <div class="field"><label>출석번호</label><input type="number" id="manual-num" placeholder="예) 15"></div>
        <div class="field"><label>이름</label><input type="text" id="manual-name" placeholder="홍길동"></div>
        <button onclick="manualVerify()" style="padding:10px 16px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;">확인</button>
      </div>
    </div>
  </div>
</div>
<div id="exam-screen" style="display:none;">
  <div class="header">
    <div class="header-title" id="exam-title">—</div>
    <div class="header-sub" id="exam-class">—</div>
  </div>
  <div class="card">
    <div class="verified-badge" id="verified-badge">✓ 확인됨</div>
    <div class="info-grid">
      <div class="field"><label>이름</label><input type="text" id="student-name" readonly disabled></div>
      <div class="field"><label>번호</label><input type="text" id="student-num" readonly disabled></div>
    </div>
  </div>
  <div class="section-title" id="mc-section-title" style="display:none;">객관식 답안</div>
  <div id="mc-questions"></div>
  <div class="section-title" id="essay-section-title" style="display:none;">서술형 답안</div>
  <div id="essay-questions"></div>
  <div class="submit-wrap">
    <button class="submit-btn" id="submit-btn" onclick="submitAnswers()">답안 제출하기</button>
  </div>
</div>
<div id="result-screen">
  <div class="header">
    <div class="header-title">채점 결과</div>
    <div class="header-sub" id="result-exam-title">—</div>
  </div>
  <div class="result-header">
    <div class="result-name" id="result-name">—</div>
    <div class="result-score" id="result-score">—<span>점</span></div>
    <div class="result-sub" id="result-sub">—</div>
  </div>
  <div class="card" style="padding:0;overflow:hidden;">
    <table class="result-tbl">
      <thead><tr><th>번호</th><th>정답</th><th>내 답안</th><th>채점</th></tr></thead>
      <tbody id="result-body"></tbody>
    </table>
  </div>
  <div class="essay-notice" id="essay-notice" style="display:none;">📝 서술형 답안은 선생님이 확인 후 점수를 입력해드립니다.</div>
</div>
<script>
const SB_URL='https://vvbanjdioahaaqamibbh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2YmFuamRpb2FoYWFxYW1pYmJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzAzOTYsImV4cCI6MjA5MTQwNjM5Nn0.gKFDN93mmaKhVH-Quw69bZl9AYaVp_b4aJ02oT9C-Bc';
const CHOICES=['①','②','③','④','⑤'];
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

let examData=null,studentInfo=null;
const mcAnswers={},essayAnswers={};

async function sbGet(t,q=''){const r=await fetch(SB_URL+'/rest/v1/'+t+q,{headers:H});return r.json();}
async function sbPost(t,b){const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});return r.json();}
async function sbPatch(t,b,q){await fetch(SB_URL+'/rest/v1/'+t+q,{method:'PATCH',headers:H,body:JSON.stringify(b)});}

function showError(msg){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('verify-screen').style.display='none';
  document.getElementById('exam-screen').style.display='none';
  document.getElementById('error-screen').style.display='block';
  document.getElementById('error-msg').innerHTML=msg;
}

async function init(){
  const p=new URLSearchParams(location.search);
  const examId=p.get('examId');
  const sq=p.get('s');
  if(!examId){showError('QR코드가 올바르지 않습니다.<br>시험지의 QR코드를 다시 스캔해주세요.');return;}
  try{
    const exams=await sbGet('exams','?exam_id=eq.'+examId);
    if(!exams||!exams.length){showError('시험을 찾을 수 없습니다.');return;}
    if(exams[0].active!=='Y'){showError('마감된 시험입니다. 선생님께 문의하세요.');return;}
    const allQuestions=JSON.parse(exams[0].questions_json);
    examData={...exams[0],questions:allQuestions.map(q=>({num:q.num,type:q.type,score:q.score})),allQuestions};
  }catch(e){showError('서버 연결 실패. 인터넷을 확인해주세요.');return;}

  if(sq){
    try{
      const info=JSON.parse(atob(sq));
      studentInfo={classId:info.classId,studentNum:String(info.studentNum),studentName:info.studentName};
      document.getElementById('loading-screen').style.display='none';
      showExamScreen();return;
    }catch(e){}
  }
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('verify-exam-title').textContent=examData.title;
  document.getElementById('verify-exam-class').textContent=(examData.class_name||'')+(examData.exam_date?' · '+examData.exam_date:'');
  document.getElementById('verify-screen').style.display='block';
}

function manualVerify(){
  const num=document.getElementById('manual-num').value.trim();
  const name=document.getElementById('manual-name').value.trim();
  if(!num||!name){alert('번호와 이름을 모두 입력해주세요.');return;}
  studentInfo={classId:examData.class_id,studentNum:num,studentName:name};
  document.getElementById('verify-screen').style.display='none';
  showExamScreen();
}

function showExamScreen(){
  document.getElementById('exam-screen').style.display='block';
  document.getElementById('exam-title').textContent=examData.title;
  document.getElementById('exam-class').textContent=(examData.class_name||'')+(examData.exam_date?' · '+examData.exam_date:'');
  document.getElementById('verified-badge').textContent='✓  '+studentInfo.studentName+' 학생 확인됨';
  document.getElementById('student-name').value=studentInfo.studentName;
  document.getElementById('student-num').value=studentInfo.studentNum+'번';
  const mcQs=examData.questions.filter(q=>q.type==='mc');
  const essayQs=examData.questions.filter(q=>q.type==='essay');
  if(mcQs.length){
    document.getElementById('mc-section-title').style.display='block';
    const wrap=document.getElementById('mc-questions');
    mcQs.forEach(q=>{
      const card=document.createElement('div');card.className='q-card';
      card.innerHTML=`<div class="q-head"><span class="q-num">${q.num}번</span><span class="q-score">${q.score}점</span></div><div class="choices" id="ch-${q.num}"></div>`;
      wrap.appendChild(card);
      const cEl=card.querySelector('#ch-'+q.num);
      CHOICES.forEach(label=>{
        const btn=document.createElement('button');btn.className='choice';btn.textContent=label;
        btn.onclick=()=>{cEl.querySelectorAll('.choice').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');mcAnswers[q.num]=label;};
        cEl.appendChild(btn);
      });
    });
  }
  if(essayQs.length){
    document.getElementById('essay-section-title').style.display='block';
    const wrap=document.getElementById('essay-questions');
    essayQs.forEach(q=>{
      const card=document.createElement('div');card.className='q-card';
      card.innerHTML=`<div class="q-head"><span class="q-num">${q.num}번</span><span class="q-score">${q.score}점</span><span class="tag-essay">서술형 — 선생님 채점</span></div><textarea class="essay-box" id="ess-${q.num}" placeholder="풀이 과정과 답을 써주세요..."></textarea>`;
      wrap.appendChild(card);
      card.querySelector('#ess-'+q.num).addEventListener('input',e=>{essayAnswers[q.num]=e.target.value;});
    });
  }
}

async function submitAnswers(){
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='제출 중...';
  try{
    const existing=await sbGet('submissions','?exam_id=eq.'+examData.exam_id+'&student_number=eq.'+studentInfo.studentNum+'&class_id=eq.'+examData.class_id);
    if(existing&&existing.length){alert('이미 제출한 시험입니다. 선생님께 문의하세요.');btn.disabled=false;btn.textContent='답안 제출하기';return;}
    const allQ=examData.allQuestions;
    const mcQs=allQ.filter(q=>q.type==='mc');
    let mcScore=0;const gradedMC={};
    mcQs.forEach(q=>{
      const submitted=String(mcAnswers[q.num]||'');
      const correct=String(q.answer);
      const isCorrect=submitted===correct;
      if(isCorrect)mcScore+=Number(q.score);
      gradedMC[q.num]={submitted,correct,isCorrect,score:isCorrect?Number(q.score):0};
    });
    const mcTotal=mcQs.reduce((s,q)=>s+Number(q.score),0);
    const submitId='SUB'+Date.now();
    await sbPost('submissions',{
      submit_id:submitId,exam_id:examData.exam_id,exam_title:examData.title,
      class_id:examData.class_id,class_name:examData.class_name,
      student_number:studentInfo.studentNum,student_name:studentInfo.studentName,
      submitted_at:new Date().toLocaleString('ko-KR'),
      answers_json:JSON.stringify({mc:mcAnswers,essay:essayAnswers}),
      mc_score:mcScore,essay_score:0,total_score:mcScore,graded:'N'
    });
    // 오답통계
    for(const[num,result]of Object.entries(gradedMC)){
      const ex=await sbGet('item_stats','?exam_id=eq.'+examData.exam_id+'&item_number=eq.'+num);
      if(ex&&ex.length){
        const total=ex[0].total_count+1;
        const wrong=ex[0].wrong_count+(result.isCorrect?0:1);
        await sbPatch('item_stats',{total_count:total,wrong_count:wrong,wrong_pct:Math.round(wrong/total*100)},'?exam_id=eq.'+examData.exam_id+'&item_number=eq.'+num);
      }else{
        await sbPost('item_stats',{exam_id:examData.exam_id,item_number:Number(num),total_count:1,wrong_count:result.isCorrect?0:1,wrong_pct:result.isCorrect?0:100});
      }
    }
    renderResult({studentName:studentInfo.studentName,mcScore,mcTotal,gradedMC,hasEssay:allQ.some(q=>q.type==='essay')});
  }catch(e){alert('제출 실패. 다시 시도해주세요.\n'+e.message);btn.disabled=false;btn.textContent='답안 제출하기';}
}

function renderResult(data){
  document.getElementById('exam-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  document.getElementById('result-exam-title').textContent=examData.title;
  document.getElementById('result-name').textContent=data.studentName+' 학생';
  document.getElementById('result-score').innerHTML=`${data.mcScore}<span>/${data.mcTotal}점 (객관식)</span>`;
  document.getElementById('result-sub').textContent=`정답률 ${Math.round(data.mcScore/data.mcTotal*100)}%`;
  const tbody=document.getElementById('result-body');
  examData.questions.filter(q=>q.type==='mc').forEach(q=>{
    const g=data.gradedMC[q.num];
    const tr=document.createElement('tr');
    const ox=g?(g.isCorrect?`<span class="badge-o"><svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5"/></svg></span>`:`<span class="badge-x"><svg width="14" height="14" viewBox="0 0 14 14"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg></span>`):'<span class="badge-skip">미응답</span>';
    tr.innerHTML=`<td>${q.num}</td><td style="font-size:16px;">${g?g.correct:'—'}</td><td style="font-size:16px;color:${g&&!g.isCorrect?'#ef4444':'#374151'}">${g?(g.submitted||'—'):'—'}</td><td>${ox}</td>`;
    tbody.appendChild(tr);
  });
  if(data.hasEssay)document.getElementById('essay-notice').style.display='block';
  window.scrollTo(0,0);
}

init();
</script>
</body>
</html>
